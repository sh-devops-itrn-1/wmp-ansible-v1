- name: Frontend Setup
  hosts: all
  become: yes
  tasks:
    - name: Install repo file
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -

    - name: Install nginx
      ansible.builtin.dnf:
        name:
          - '@nginx:1.26'
          - nodejs
        state: present

    - name: Copy nginx config file
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

    - name: Remove file (delete file)
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: absent

    - name: Create a directory if it does not exist
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: directory

    - name: Extract and download
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/frontend.tar.gz
        dest: /usr/share/nginx
        remote_src: yes

    - name: Build frontend
      ansible.builtin.shell: npm ci ; npm run build ; mv dist html
      args:
        chdir: /usr/share/nginx/

    - name: Start nginx
      ansible.builtin.systemd_service:
        name: nginx
        enabled: yes
        state: restarted


